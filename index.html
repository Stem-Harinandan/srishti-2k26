<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SRISHTI 2K26</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
/>

</head>

<body>

<audio id="introSound">
    <source src="intro.mp3" type="audio/mp3">
</audio>

<div class="background">

    <div class="glow"></div>

    <div class="fog fog-left"></div>
    <div class="fog fog-right"></div>

    <div class="noise"></div>

    <div class="vignette"></div>

    <div class="particles">

        <span style="left:10%; animation-duration:12s;"></span>
        <span style="left:20%; animation-duration:16s;"></span>
        <span style="left:30%; animation-duration:14s;"></span>
        <span style="left:40%; animation-duration:18s;"></span>
        <span style="left:50%; animation-duration:13s;"></span>
        <span style="left:60%; animation-duration:17s;"></span>
        <span style="left:70%; animation-duration:15s;"></span>
        <span style="left:80%; animation-duration:20s;"></span>
        <span style="left:90%; animation-duration:11s;"></span>

    </div>

</div>

<main class="container">

    <div class="logo-wrap">

        <div class="logo-light"></div>

        <img
        src="logo.png"
        alt="SRISHTI Logo"
        class="logo">

    </div>

    <p class="eyebrow">
        AN INTERSCHOOL EVENT BY
    </p>

    <h2 class="school">
        SARASWATHY VIDYALAYAM
    </h2>

    <div class="divider">

        <span></span>

        <div class="diamond"></div>

        <span></span>

    </div>

    <div class="headline-wrap">

        <div class="headline-glow"></div>

        <h1 class="headline">
            NOT JUST AN EVENT
        </h1>

    </div>

    <p class="tagline">
        SOMETHING MASSIVE IS APPROACHING
    </p>

    <div class="socials">

        <a href="#" class="social">
            <i class="fa-brands fa-instagram"></i>
        </a>

        <a href="#" class="social">
            <i class="fa-brands fa-youtube"></i>
        </a>

        <a href="#" class="social">
            <i class="fa-regular fa-envelope"></i>
        </a>

    </div>

</main>

<footer class="footer">
    THE RETURN OF SRISHTI • 2026
</footer>

<script>

window.addEventListener("load", ()=>{

    document.body.classList.add("loaded");

});

let played = false;

document.addEventListener("click", ()=>{

    if(!played){

        const sound =
        document.getElementById("introSound");

        sound.volume = 0.35;

        sound.play();

        played = true;

    }

});

const glow =
document.querySelector(".glow");

document.addEventListener("mousemove",(e)=>{

    const x =
    e.clientX / window.innerWidth;

    const y =
    e.clientY / window.innerHeight;

    glow.style.transform =
    `translate(-50%,-50%)
    translate(${x * 20 - 10}px,
    ${y * 20 - 10}px)`;

});

const logo =
document.querySelector(".logo");

document.addEventListener("mousemove",(e)=>{

    const x =
    (window.innerWidth / 2 - e.clientX) / 60;

    const y =
    (window.innerHeight / 2 - e.clientY) / 60;

    logo.style.transform =
    `translate(${x}px, ${y}px)`;

});

const tagline =
document.querySelector(".tagline");

const lines = [

    "SOMETHING MASSIVE IS APPROACHING",

    "THE STAGE RETURNS IN 2026",

    "WHERE TALENT COLLIDES",

    "A NEW ERA OF SRISHTI",

    "BEYOND COMPETITION"

];

let current = 0;

setInterval(()=>{

    tagline.style.opacity = 0;

    setTimeout(()=>{

        current =
        (current + 1) % lines.length;

        tagline.innerText =
        lines[current];

        tagline.style.opacity = 1;

    },400);

},3500);

document.addEventListener(
"contextmenu",
e => e.preventDefault()
);

</script>

</body>
</html>

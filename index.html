<body>

    <div class="background">

        <div class="glow"></div>

        <div class="secondary-glow"></div>

        <div class="noise"></div>

        <div class="grid-lines"></div>

        <div class="vignette"></div>

            <span style="left:34%; animation-duration:13s;"></span>
            <span style="left:38%; animation-duration:16s;"></span>
            <span style="left:42%; animation-duration:22s;"></span>
            <span style="left:46%; animation-duration:12s;"></span>
            <span style="left:50%; animation-duration:17s;"></span>

            <span style="left:90%; animation-duration:17s;"></span>
            <span style="left:94%; animation-duration:13s;"></span>

        </div>

    </div>

    <button id="audioToggle">SOUND ON</button>
    <button id="testReveal">TEST REVEAL</button>


    <main class="container">

        <div class="countdown-wrap">

            <p class="countdown-label">
                SRISHTI 2K26 UNVEILS IN
            </p>

            <div class="countdown">

                <div class="time-box">
                    <span id="days">00</span>
                    <small>DAYS</small>
                </div>

                <div class="time-box">
                    <span id="hours">00</span>
                    <small>HOURS</small>
                </div>

                <div class="time-box">
                    <span id="minutes">00</span>
                    <small>MINUTES</small>
                </div>

                <div class="time-box">
                    <span id="seconds">00</span>
                    <small>SECONDS</small>
                </div>

            </div>

        </div>

        <div class="logo-wrap">

            <div class="logo-atmosphere"></div>

            <!--
                SECURITY NOTE:
                logo-blur src is set here (blurred image is intentionally visible).
                logo-clear has NO src — it is injected by JS only at reveal time.
                This prevents the real logo from being downloaded before the reveal.
            -->

            <img
            src="logo_blur.png"
            alt="Blurred Logo"
            class="logo-blur"
            draggable="false">

            <!-- src intentionally blank — set by script.js on reveal -->
            <img
            src=""
            alt="Sharp Logo"
            class="logo-clear"
            id="logoClear"
            draggable="false">

            <div class="reveal-flash"></div>

        </div>

        <p class="eyebrow">
            AN INTERSCHOOL EVENT BY
        </p>

        <h2 class="school">
            SARASWATHI VIDYALAYA
        </h2>

        <div class="divider">

            <span></span>

            <div class="diamond"></div>

            <span></span>

        </div>

        <h1 class="headline">
            UNVEILING SOON
        </h1>

        <p class="tagline tagline-show">
            2022 • DEXTERITY • ALLIES • ADULATION
        </p>

        <div class="socials">

            <a
            href="https://www.instagram.com/srishti2k26?igsh=am52a2w4dWM1dGky"
            target="_blank"
            class="social">

                <i class="fa-brands fa-instagram"></i>

            </a>

        </div>

    </main>

    <footer class="footer">
        THE RETURN IS IMMINENT • 2026
    </footer>

    <script src="script.js"></script>

</body>

<audio id="bgMusic" autoplay loop>
    <source src="ambient.mp3" type="audio/mpeg">
</audio>

<audio id="revealSound" preload="auto">
    <source src="reveal.mp3" type="audio/mpeg">
</audio>

</html>
